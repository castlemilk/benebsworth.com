                - generic [ref=e74]: April 2018 — September 2018
              - heading "DevOps/FullStack Engineer · Digio" [level=3] [ref=e75]
              - paragraph [ref=e76]: Building highly automated and robust production grade platforms on top of Kubernetes. Utilising service-mesh technologies such as Istio to enable sophisticated microservice architectures. Enabling next-generation monitoring/observability capabilities, CI/CD pipelines, and security practices. Led the delivery of Australia's first Istio deployment into production.
