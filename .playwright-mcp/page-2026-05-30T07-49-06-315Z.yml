              - heading "Senior DevOps/FullStack Engineer · Digio" [level=3] [ref=e61]
              - paragraph [ref=e62]: Leading the development and deployment of a set of production grade platform components on GCP. Facilitating adoption and consumption of the platform through a series of developer tooling and frameworks to streamline onboarding. Delivered the first production-grade GKE/GCP based platform for one of Australia's biggest banks.
        - listitem [ref=e63]:
