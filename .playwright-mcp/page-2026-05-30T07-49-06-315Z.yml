              - paragraph [ref=e104]: Primarily working with networking/telecommunication technologies — Cisco, Juniper, Palo Alto, and Checkpoint, and the respective CLI/GUI/automation tooling. Responsible for building out a range of small automation tools using Python and the Python SSH library Paramiko.
