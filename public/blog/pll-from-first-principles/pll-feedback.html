<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase-Locked Loop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #0a0a0a;
      --color-fg: #e2e8f0;
      --color-muted: #94a3b8;
      --color-border: #1e293b;
      --color-border-hover: #334155;
      --color-grid-line: #0f1b33;
      --color-card-bg: #060d20;
    }
    body { font-family: 'Inter', monospace; background: var(--color-bg);
         min-height: 100vh; padding: 0; color: var(--color-fg); overflow: hidden;
         display: flex; align-items: center; justify-content: center; }
  .container { max-width: 1100px; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.4rem; }
  .pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: #7C5CFF; }
  h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .subtitle { color: var(--color-muted); font-size: 0.8rem; margin-bottom: 1.5rem; }
  .diagram-card { border: none; border-radius: 0; position: relative;
    background: transparent; padding: 1.5rem; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center; }
  .pause-btn { position: fixed; top: 16px; right: 16px; z-index: 20; background: var(--color-card-bg);
    border: 1px solid var(--color-border); color: var(--color-muted); border-radius: 6px; padding: 6px 12px;
    font: inherit; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .pause-btn:hover { color: var(--color-fg); border-color: var(--color-border-hover); }
  .footer { color: #475569; font-size: 0.7rem; margin-top: 1rem; }
  .flow { stroke-dasharray: 5 5; }
  .flow-async { stroke-dasharray: 2 4; }
  .flow-auth { stroke-dasharray: 4 4; }
  @media (prefers-reduced-motion: no-preference) {
    .flow { animation: dashmove 0.75s linear infinite; }
    .flow-async { animation: dashasync 0.9s linear infinite; }
    .flow-auth { animation: dashauth 1.2s linear infinite; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
  }
  @keyframes dashmove { to { stroke-dashoffset: -10; } }
  @keyframes dashasync { to { stroke-dashoffset: -12; } }
  @keyframes dashauth { to { stroke-dashoffset: -8; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  body.paused .flow, body.paused .flow-async, body.paused .flow-auth,
  body.paused .pulse-dot { animation-play-state: paused; }
  #oscilloscope {
    position: fixed; pointer-events: none; opacity: 0; transition: opacity 0.1s;
    background: var(--color-card-bg); border: 1px solid var(--color-border); border-radius: 8px;
    padding: 8px; z-index: 100; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
    color: #00E0B8; font-family: monospace;
  }
  .tooltip-title { font-size: 10px; color: var(--color-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.1em; }
  #oscope-canvas { display: block; width: 160px; height: 60px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem; margin-top: 1.25rem; }
  .card { border: 1px solid var(--color-border); border-radius: 10px; background: var(--color-card-bg); padding: 1rem 1.1rem; }
  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0.6rem; }
  .card-dot { width: 8px; height: 8px; border-radius: 50%; }
  .card-dot.cyan { background: var(--color-cyan, #7C5CFF); } .card-dot.violet { background: var(--color-violet, #a78bfa); }
  .card-dot.rose { background: var(--color-rose, #fb7185); }
  .card h3 { font-size: 0.8rem; font-weight: 600; }
  .card ul { list-style: none; } .card li { font-size: 0.72rem; color: var(--color-muted); line-height: 1.7; }
</style>
</head>
<body>
<div class="container">
  <div class="diagram-card">
    <button class="pause-btn" id="pauseBtn" aria-pressed="false">⏸ pause</button>
    <svg id="flowsvg" width="100%" viewBox="0 0 1021 170" role="img"><title>Phase-Locked Loop animated diagram</title><desc>Top-down architecture diagram; dashed connectors animate in the direction of flow and dots ride the main paths.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><g fill="none"><path class="flow" d="M110.5 90 V114 H334.5 V94" stroke="#00E0B8" stroke-width="1" opacity="1" marker-end="url(#arrow)"/><path class="flow" d="M334.5 90 V114 H547 V94" stroke="#00E0B8" stroke-width="1" opacity="1" marker-end="url(#arrow)"/><path class="flow" d="M547 90 V114 H734.5 V94" stroke="#00E0B8" stroke-width="1" opacity="1" marker-end="url(#arrow)"/><path class="flow" d="M734.5 90 V114 H922 V94" stroke="#00E0B8" stroke-width="1" opacity="1" marker-end="url(#arrow)"/><path class="flow" d="M734.5 90 V114 H334.5 V94" stroke="#00E0B8" stroke-width="1" opacity="1" marker-end="url(#arrow)"/></g><text x="446.8" y="111" fill="var(--color-muted)" font-size="10">Error u_d(t)</text><text x="646.8" y="111" fill="var(--color-muted)" font-size="10">Voltage u_c(t)</text><text x="544.5" y="111" fill="var(--color-muted)" font-size="10">Feedback y(t)</text><g><circle r="3.5" class="dot" fill="#00E0B8"><animateMotion id="j0_0" dur="1.8s" begin="0s;j0_3.end+0.6s" fill="freeze" path="M110.5 90 V114 H334.5 V94"/></circle><circle r="3.5" class="dot" fill="#00E0B8"><animateMotion id="j0_1" dur="1.7s" begin="j0_0.end+0.3s" fill="freeze" path="M334.5 90 V114 H547 V94"/></circle><circle r="3.5" class="dot" fill="#00E0B8"><animateMotion id="j0_2" dur="1.5s" begin="j0_1.end+0.3s" fill="freeze" path="M547 90 V114 H734.5 V94"/></circle><circle r="3.5" class="dot" fill="#00E0B8"><animateMotion id="j0_3" dur="1.5s" begin="j0_2.end+0.3s" fill="freeze" path="M734.5 90 V114 H922 V94"/></circle><circle r="3.5" class="dot" fill="#7C5CFF"><animateMotion id="j1_0" dur="3.0s" begin="0s;j1_0.end+0.6s" fill="freeze" path="M734.5 90 V114 H334.5 V94"/></circle></g><g font-family="Inter, monospace" text-anchor="middle"><g class="signal-node" data-signal="square" style="cursor: crosshair;"><rect x="34" y="34" width="153" height="56" rx="8" fill="var(--color-bg)"/><rect x="34" y="34" width="153" height="56" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/><text x="110.5" y="57" fill="var(--color-fg)" font-size="13" font-weight="500">r(t)</text><text x="110.5" y="80" fill="var(--color-muted)" font-size="10">Reference phase</text></g><g class="signal-node" data-signal="pulse" style="cursor: crosshair;"><rect x="227" y="34" width="215" height="56" rx="8" fill="var(--color-bg)"/><rect x="227" y="34" width="215" height="56" rx="8" fill="rgba(0,224,184,0.15)" stroke="#00E0B8" stroke-width="1.5"/><text x="334.5" y="57" fill="var(--color-fg)" font-size="13" font-weight="500">Phase Detector ⊕</text><text x="334.5" y="80" fill="var(--color-muted)" font-size="10">Computes Δθ = r(t) - y(t)</text></g><g class="signal-node" data-signal="dc" style="cursor: crosshair;"><rect x="482" y="34" width="130" height="56" rx="8" fill="var(--color-bg)"/><rect x="482" y="34" width="130" height="56" rx="8" fill="rgba(0,224,184,0.15)" stroke="#00E0B8" stroke-width="1.5"/><text x="547" y="57" fill="var(--color-fg)" font-size="13" font-weight="500">Loop Filter</text><text x="547" y="80" fill="var(--color-muted)" font-size="10">PI Controller</text></g><g class="signal-node" data-signal="sawtooth" style="cursor: crosshair;"><rect x="652" y="34" width="165" height="56" rx="8" fill="var(--color-bg)"/><rect x="652" y="34" width="165" height="56" rx="8" fill="rgba(0,224,184,0.15)" stroke="#00E0B8" stroke-width="1.5"/><text x="734.5" y="57" fill="var(--color-fg)" font-size="13" font-weight="500">VCO (NCO)</text><text x="734.5" y="80" fill="var(--color-muted)" font-size="10">Plant (Integrator)</text></g><g class="signal-node" data-signal="sawtooth" style="cursor: crosshair;"><rect x="857" y="34" width="130" height="56" rx="8" fill="var(--color-bg)"/><rect x="857" y="34" width="130" height="56" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/><text x="922" y="57" fill="var(--color-fg)" font-size="13" font-weight="500">y(t)</text><text x="922" y="80" fill="var(--color-muted)" font-size="10">Output phase</text></g></g><g font-family="Inter, monospace" font-size="11"><rect x="34" y="120" width="12" height="12" rx="3" fill="rgba(30,41,59,0.5)" stroke="#94a3b8"/><text x="52" y="130" fill="#94a3b8" font-size="11">external</text><rect x="142" y="120" width="12" height="12" rx="3" fill="rgba(0,224,184,0.15)" stroke="#00E0B8"/><text x="160" y="130" fill="#94a3b8" font-size="11">block</text><circle cx="235" cy="126" r="3.5" fill="#7C5CFF"/><text x="245" y="130" fill="#94a3b8" font-size="11">request in flight</text></g></svg>
  </div>
  
  
</div>
<div id="oscilloscope" class="tooltip">
  <div class="tooltip-title">Signal</div>
  <canvas id="oscope-canvas" width="160" height="60"></canvas>
</div>

<script>
(function () {
  var svg = document.getElementById('flowsvg');
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('.dot').forEach(function (d) { d.remove(); });
    var b = document.getElementById('pauseBtn'); if (b) b.remove(); return;
  }
  var btn = document.getElementById('pauseBtn'); var paused = false;
  btn.addEventListener('click', function () {
    paused = !paused; document.body.classList.toggle('paused', paused);
    paused ? svg.pauseAnimations() : svg.unpauseAnimations();
    btn.textContent = paused ? '▶ play' : '⏸ pause';
    btn.setAttribute('aria-pressed', paused);
  });

  var oscope = document.getElementById('oscilloscope');
  var ocanvas = document.getElementById('oscope-canvas');
  var ctx = ocanvas ? ocanvas.getContext('2d') : null;
  var signalType = null;
  var animFrame = null;
  var time = 0;

  function drawSignal() {
    if (!ctx || !signalType) return;
    time -= 1;
    ctx.clearRect(0, 0, 160, 60);
    
    // Draw grid
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0; i<=160; i+=20) { ctx.moveTo(i,0); ctx.lineTo(i,60); }
    for(let j=0; j<=60; j+=20) { ctx.moveTo(0,j); ctx.lineTo(160,j); }
    ctx.stroke();

    ctx.strokeStyle = '#00E0B8';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let x = 0; x < 160; x++) {
      let t = (x - time) * 0.1;
      let y = 30;
      if (signalType === 'square') {
        y = 30 + (Math.sin(t) > 0 ? -15 : 15);
      } else if (signalType === 'sine') {
        y = 30 - Math.sin(t) * 15;
      } else if (signalType === 'sawtooth') {
        y = 30 - (((t / Math.PI) % 2) - 1) * 15;
      } else if (signalType === 'pulse') {
        y = 30 + (Math.sin(t) > 0.8 ? -15 : 15);
      } else if (signalType === 'dc') {
        y = 30 + Math.sin(t*0.5)*1 + (Math.random()-0.5)*3;
      }
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    if (!paused) animFrame = requestAnimationFrame(drawSignal);
  }

  document.querySelectorAll('.signal-node').forEach(function(node) {
    node.addEventListener('mouseenter', function(e) {
      signalType = node.getAttribute('data-signal');
      oscope.style.opacity = 1;
      document.querySelector('.tooltip-title').innerText = "Signal: " + signalType;
      if (!animFrame && !paused) drawSignal();
    });
    node.addEventListener('mousemove', function(e) {
      oscope.style.left = (e.clientX + 15) + 'px';
      oscope.style.top = (e.clientY + 15) + 'px';
    });
    node.addEventListener('mouseleave', function() {
      oscope.style.opacity = 0;
      signalType = null;
      if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    });
  });
})();
</script>

</body>
</html>
