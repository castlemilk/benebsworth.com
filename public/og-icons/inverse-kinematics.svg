<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 172" fill="none">
  <rect width="172" height="172" rx="24" fill="#0d1a22"/>
  <rect x="1" y="1" width="170" height="170" rx="23" fill="none" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="2"/>
  <!-- Base -->
  <line x1="40" y1="132" x2="132" y2="132" stroke="#00b4d8" stroke-width="2.5" opacity="0.5"/>
  <circle cx="40" cy="132" r="5" fill="#00b4d8"/>
  <!-- Link 1 (shoulder to elbow) -->
  <line x1="40" y1="132" x2="90" y2="88" stroke="#00b4d8" stroke-width="4" stroke-linecap="round"/>
  <!-- Link 2 (elbow to end-effector) -->
  <line x1="90" y1="88" x2="130" y2="58" stroke="#00b4d8" stroke-width="4" stroke-linecap="round"/>
  <!-- Joints -->
  <circle cx="40" cy="132" r="7" fill="#00b4d8"/>
  <circle cx="90" cy="88" r="6" fill="#00b4d8"/>
  <!-- End effector -->
  <circle cx="130" cy="58" r="8" fill="#00b4d8"/>
  <circle cx="130" cy="58" r="12" stroke="#00b4d8" stroke-width="2" opacity="0.4"/>
  <!-- Target point (slightly different) -->
  <circle cx="126" cy="54" r="5" stroke="#00b4d8" stroke-width="2" stroke-dasharray="3 2" opacity="0.6"/>
  <!-- Link length labels -->
  <text x="58" y="112" font-family="monospace" font-size="10" fill="#00b4d8" opacity="0.7">L₁</text>
  <text x="106" y="74" font-family="monospace" font-size="10" fill="#00b4d8" opacity="0.7">L₂</text>
  <!-- Angle arc -->
  <path d="M40,132 Q55,120 60,118" stroke="#00b4d8" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- IK label -->
  <text x="14" y="22" font-family="monospace" font-size="13" fill="#00b4d8" opacity="0.9">IK</text>
</svg>