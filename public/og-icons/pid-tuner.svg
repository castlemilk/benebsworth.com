<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 172" fill="none">
  <rect width="172" height="172" rx="24" fill="#0d1a22"/>
  <rect x="1" y="1" width="170" height="170" rx="23" fill="none" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="2"/>
  <!-- Step input -->
  <line x1="18" y1="118" x2="38" y2="118" stroke="#00b4d8" stroke-width="2.5" opacity="0.6"/>
  <line x1="38" y1="118" x2="38" y2="42" stroke="#00b4d8" stroke-width="2.5" opacity="0.6"/>
  <line x1="38" y1="42" x2="154" y2="42" stroke="#00b4d8" stroke-width="2.5" opacity="0.6"/>
  <!-- PID response (overshoot + settle) -->
  <path d="M38,118 L38,118 Q52,118 60,60 Q68,28 76,50 Q84,68 92,56 Q100,48 108,52 Q116,54 126,55 Q140,56 154,56" stroke="#00b4d8" stroke-width="3" stroke-linecap="round"/>
  <!-- Overshoot annotation -->
  <line x1="72" y1="28" x2="72" y2="42" stroke="#00b4d8" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>
  <line x1="68" y1="28" x2="76" y2="28" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
  <text x="74" y="24" font-family="monospace" font-size="10" fill="#00b4d8" opacity="0.9">OS</text>
  <!-- Settling zone -->
  <line x1="108" y1="48" x2="154" y2="48" stroke="#00b4d8" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="108" y1="62" x2="154" y2="62" stroke="#00b4d8" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <!-- PID label -->
  <text x="14" y="22" font-family="monospace" font-size="13" fill="#00b4d8" opacity="0.9">PID</text>
  <!-- Axis -->
  <line x1="18" y1="118" x2="154" y2="118" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>
</svg>